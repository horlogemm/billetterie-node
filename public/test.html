<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4b6cb7,#182848);
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    margin-top:10px;
    font-size:14px;
}

input{
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#4b6cb7;
}

.checkbox{
    margin-top:15px;
    font-size:13px;
}

button{
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4b6cb7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#3a539b;
}

.small{
    font-size:12px;
    color:#666;
    text-align:center;
    margin-top:15px;
}

</style>
</head>


<body>

<div class="container">

<h1>Inscription</h1>

<form action="/generate" method="POST">

<label>Prénom</label>
<input type="text" name="firstname" required>

<label>Nom</label>
<input type="text" name="lastname" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Téléphone</label>
<input type="text" name="phone" required>

<label>Entreprise</label>
<input type="text" name="entreprise">

<div class="checkbox">
<label>
<input type="checkbox" required>
J’accepte que les informations saisies soient utilisées pour générer mon billet et me l’envoyer par email.
</label>
</div>

<button type="submit">Générer mon billet</button>

</form>

<div class="small">
Votre billet vous sera envoyé par email.
</div>

</div>

</body>
</html>
